  # CELERY BEAT (SCHEDULER - Disabled for now - implement later)
  # ============================================
  # celery_beat:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: nutriai_celery_beat
  #   command: celery -A app.celery_app beat --loglevel=info
  #   volumes:
  #     - ./backend:/app
  #   environment:
  #     - DATABASE_URL=postgresql://nutriai_user:${POSTGRES_PASSWORD:-nutriai_pass_dev}@postgres:5432/nutriai_db

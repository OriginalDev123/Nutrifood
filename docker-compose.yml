  #   networks:
  #     - nutriai_network
  #   restart: unless-stopped

  # ============================================
  # PGADMIN (Database GUI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutriai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nutriai.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - nutriai_network
    depends_on:
      - postgres
    restart: unless-stopped

  # ============================================
  # REDIS COMMANDER (Redis GUI)
  # ============================================
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: nutriai_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - nutriai_network
    depends_on:
      - redis
    restart: unless-stopped

  # ============================================
  # WEB APP (React Frontend)
  # ============================================
  web_app:
    build:
      context: ./web_app
      dockerfile: Dockerfile
    container_name: nutriai_web_app
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_AI_SERVICE_URL=http://ai_service:8001
    depends_on:
      - backend
    networks:
      - nutriai_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# ============================================
# NETWORKS
# ============================================
networks:
  nutriai_network:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  pgadmin_data:
    driver: local
  uploads:
    driver: local
  ai_temp_uploads:  # 🆕 Volume for AI Service temp files
    driver: local
# docker-compose.yml
version: '3.8'

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: nutriai_postgres
    environment:
      POSTGRES_DB: nutriai_db
      POSTGRES_USER: nutriai_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutriai_pass_dev}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - nutriai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriai_user -d nutriai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: nutriai_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nutriai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # QDRANT VECTOR DATABASE
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nutriai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - nutriai_network
    restart: unless-stopped

  # ============================================
  # FASTAPI BACKEND
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutriai_backend
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:${POSTGRES_PASSWORD:-nutriai_pass_dev}@postgres:5432/nutriai_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
      - AI_SERVICE_URL=http://ai_service:8001
      - ENVIRONMENT=development
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nutriai_network
    restart: unless-stopped

  # ============================================
  # AI SERVICE (Gemini Vision + AI Features) 🆕
  # ============================================
  ai_service:
    build:
      context: ./ai_services
      dockerfile: Dockerfile
    container_name: nutriai_ai_service
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_services:/app
      - ai_temp_uploads:/app/temp_uploads
    ports:
      - "8001:8001"
    environment:
      # AI Configuration
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-flash-latest}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-gemini-1.5-flash}
      - GEMINI_MAX_TOKENS=${GEMINI_MAX_TOKENS:-2048}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE:-0.3}
      
      # Backend Communication
      - BACKEND_API_URL=http://backend:8000
      
      # Qdrant Vector Database (Module 6)
      - QDRANT_URL=http://qdrant:6333
      
      # Redis Cache (shared with backend)
      - REDIS_URL=redis://redis:6379/1
      - CACHE_ENABLED=false
      - CACHE_TTL=3600
      
      # Service Settings
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8001
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      
      # Rate Limiting (Gemini Free Tier)
      - RATE_LIMIT_PER_MINUTE=15
      - RATE_LIMIT_PER_DAY=1500
      
      # Image Processing
      - MAX_IMAGE_SIZE_MB=5
      - ALLOWED_IMAGE_FORMATS=jpg,jpeg,png,webp
      
      # Feature Toggles
      - FEATURE_VISION_ENABLED=true
      - FEATURE_CHATBOT_ENABLED=true
      - FEATURE_MEAL_PLANNER_ENABLED=true
      - FEATURE_RECOMMENDATIONS_ENABLED=true
    depends_on:
      - redis
      - qdrant
    networks:
      - nutriai_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

